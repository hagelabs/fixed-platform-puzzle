<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0d1117" />
  <title>Fixed Platform Puzzle</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: radial-gradient(ellipse at top, #1f2937 0%, #0d1117 60%);
      color: #e5e7eb;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px 16px;
    }

    .page {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      width: 100%;
      max-width: 960px;
    }

    .page-title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin: 0;
    }

    .page-subtitle {
      font-size: 14px;
      color: #9ca3af;
      margin: 0;
    }

    .game-frame {
      width: 100%;
      max-width: 960px;
      aspect-ratio: 960 / 600;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
      touch-action: none;
    }

    #game {
      width: 100%;
      height: 100%;
    }

    canvas { display: block; }

    .page-foot {
      font-size: 12px;
      color: #6b7280;
      margin-top: 8px;
    }

    .page-foot a { color: #9ca3af; text-decoration: none; }
    .page-foot a:hover { color: #e5e7eb; }
  </style>
  <script>
    (function loadSDK(src){
      var s = document.createElement('script');
      s.src = src;
      s.async = true;
      s.onerror = function(){ console.info('[SDK] not loaded:', src); };
      document.head.appendChild(s);
    })(
      location.hostname.indexOf('crazygames') !== -1
        ? 'https://sdk.crazygames.com/crazygames-sdk-v3.js'
        : 'https://game-cdn.poki.com/scripts/v2/poki-sdk.js'
    );
  </script>
</head>
<body>
  <main class="page">
    <h1 class="page-title">Fixed Platform Puzzle</h1>
    <p class="page-subtitle">Drag colored blocks off the grid · Plan the order · Pure logic</p>
    <div class="game-frame">
      <div id="game"></div>
    </div>
    <p class="page-foot">v0.1.0 · 50 levels · Phaser 4 + TypeScript</p>
  </main>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0d1117" />
  <title>Fixed Platform Puzzle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #0d1117;
      color: #e5e7eb;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-tap-highlight-color: transparent;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
    }

    .game-frame {
      width: 100%;
      height: 100%;
      background: #0d1117;
      overflow: hidden;
      touch-action: none;
    }

    #game {
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
      image-rendering: auto;
      image-rendering: -webkit-optimize-contrast;
      width: 100% !important;
      height: 100% !important;
    }
  </style>
  <script>
    (function loadSDK(src){
      var s = document.createElement('script');
      s.src = src;
      s.async = true;
      s.onerror = function(){ console.info('[SDK] not loaded:', src); };
      document.head.appendChild(s);
    })(
      location.hostname.indexOf('crazygames') !== -1
        ? 'https://sdk.crazygames.com/crazygames-sdk-v3.js'
        : 'https://game-cdn.poki.com/scripts/v2/poki-sdk.js'
    );
  </script>
</head>
<body>
  <div class="game-frame">
    <div id="game"></div>
  </div>
</body>
</html>

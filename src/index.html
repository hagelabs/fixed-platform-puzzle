<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#000000" />
  <title>Fixed Platform Puzzle</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #1a1a1a;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }
    #game {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas {
      display: block;
    }
  </style>
  <script>
    (function loadSDK(src){
      var s = document.createElement('script');
      s.src = src;
      s.async = true;
      s.onerror = function(){ console.info('[SDK] not loaded:', src); };
      document.head.appendChild(s);
    })(
      location.hostname.indexOf('crazygames') !== -1
        ? 'https://sdk.crazygames.com/crazygames-sdk-v3.js'
        : 'https://game-cdn.poki.com/scripts/v2/poki-sdk.js'
    );
  </script>
</head>
<body>
  <div id="game"></div>
</body>
</html>
